<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&family=Sancreek&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./variables.css">
    <!-- JQUERY -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- JS -->
    <script defer src="./script.js"></script>
</head>



<body>
    <header>
        <h1>Pomodoro Timer</h1>
    </header>

    <div class="container">
        <main>
            <div class="buttons">
                <h2>Please select a timer</h2>

                <button class="active" id="pomodoro">Pomodoro</button>
                <button id="short-break">Short Break</button>
                <button id="long-break">Long Break</button>

                <article>
                    "The key is not to prioritize what's on your schedule, but to schedule your priorities. "<br>
                    - Stephen Covey
                </article>
            </div>
            <div class="timerDisplay">
                <img class="pomodoro" src="./assets/pomodoro.png" alt="Pomodoro Timer" id="timerImage">
                <input type="text" id="timerDisplay" value="25:00" readonly>
                <div>
                    <button id="plus">+</button>

                    <button id="minus">-</button>

                    <button id="start-timer">Start Timer</button>
                </div>
            </div>


        </main>

        <aside class="info pomodoro">

            <article id="timerInfo">
                <h2>Timer Info</h2>
                <div>
                    <h3 id="Title">Timer</h3>
                    <p id="Description">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
                <div>
                    <label for="cycles">Cycles:</label>
                    <input name="cycles" type="number" value="0">
                </div>
                <div>
                    <label for="cycles">Total Focus Time:</label>
                    <input name="cycles" type="number" value="0">
                    <span>min</span>
                </div>
                <div>
                    <label for="cycles">NextBreak:</label>
                    <input name="cycles" type="number" value="5">
                </div>
                <div>
                    <label for="cycles">Completed Today:</label>
                    <input name="cycles" type="number" value="3">
                    <span>sessions</span>
                </div>
            </article>


        </aside>
    </div>
</body>

</html>
