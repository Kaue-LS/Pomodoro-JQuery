<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&family=Sancreek&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./variables.css">
    <!-- JQUERY -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- JS -->
    <script defer src="./script.js"></script>
</head>



<body>
    <header>
        <div style="display: flex;">
            <img src="./assets/vineta.png" alt="">
            <h1>Pomodoro Timer</h1>
            <img src="./assets/vineta.png" alt="">
        </div>
        <img src="./assets/arrown.png" alt="">
    </header>

    <div class="container border-styled">
        <main>
            <div class="buttons ">
                <h2>Please select a timer</h2>
                <label class="active" id="pomodoro">
                    <span id="pomodoroIcon"></span>
                    <button>Pomodoro</button>
                </label>
                <label id="short-break">
                    <span id="shortBreakIcon"></span>
                    <button>Short Break</button>

                </label>
                <label id="sessions">
                    <span id="sessionIcon"></span>
                    <button>Sessions</button>

                </label>

                <article class="border-styled">
                    <p>"The key is not to prioritize what's on your schedule, but to schedule your priorities. "<br>
                        - Stephen Covey
                    </p>
                </article>
            </div>
            <div class="timerDisplay">
                <img class="pomodoro" src="./assets/pomodoro.png" alt="Pomodoro Timer" id="timerImage">
                <input type="text" id="timerDisplay" value="25:00" readonly>
                <div class="configuration">
                    <label id="plus" for="">
                        <span id="plusIcon"></span>
                        <button>MAX</button>

                    </label>
                    <label id="minus" for="">
                        <span id="minusIcon"></span>
                        <button>MIN</button>
                    </label>
                    <label id="start-timer" for="">
                        <button>Start Timer</button>
                    </label>
                </div>
                <div class="control">
                    control
                    <label for="">
                        <button>MAX</button>
                    </label>
                    <label for="">
                        <button>MIN</button>
                    </label>
                    <label for="">
                        <button>Start Timer</button>
                    </label>
                </div>
            </div>


        </main>

        <aside class="info pomodoro">

            <article id="timerInfo">
                <h2>Timer Info</h2>
                <div>
                    <h3 id="Title">Timer</h3>
                    <p id="Description">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
                <div>
                    <label for="cycles">Cycles:
                        <input name="cycles" type="number" value="0">

                    </label>
                </div>
                <div>
                    <label for="cycles">Total Focus Time:
                        <input name="cycles" type="number" value="0">
                        <span>min</span>

                    </label>
                </div>
                <div>
                    <label for="cycles">NextBreak:
                        <input name="cycles" type="number" value="5">

                    </label>
                </div>
                <div>
                    <label for="cycles">Completed Today:
                        <input name="cycles" type="number" value="3">

                    </label>
                    <span>sessions</span>
                </div>
            </article>


        </aside>
    </div>
</body>

</html>
